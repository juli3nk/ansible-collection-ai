---
- name: Ensure hermes-agent installer dependencies are present
  ansible.builtin.apt:
    name:
      - ripgrep
      - ffmpeg
      - build-essential
    state: present
    update_cache: false
  when: ansible_os_family == "Debian"

- name: Add hermesagent user to sudoers with scoped NOPASSWD
  ansible.builtin.copy:
    dest: "/etc/sudoers.d/{{ hermes_user }}"
    mode: '0440'
    owner: root
    group: root
    content: |
      # Hermesagent sudo permissions (scoped for security)
      {{ hermes_user }} ALL=(ALL) NOPASSWD: /usr/bin/systemctl start hermesagent
      {{ hermes_user }} ALL=(ALL) NOPASSWD: /usr/bin/systemctl stop hermesagent
      {{ hermes_user }} ALL=(ALL) NOPASSWD: /usr/bin/systemctl restart hermesagent
      {{ hermes_user }} ALL=(ALL) NOPASSWD: /usr/bin/systemctl status hermesagent
      {{ hermes_user }} ALL=(ALL) NOPASSWD: /usr/bin/systemctl enable hermesagent
      {{ hermes_user }} ALL=(ALL) NOPASSWD: /usr/bin/systemctl disable hermesagent
      {{ hermes_user }} ALL=(ALL) NOPASSWD: /usr/bin/systemctl daemon-reload
      {{ hermes_user }} ALL=(ALL) NOPASSWD: /usr/bin/journalctl -u hermesagent *
    validate: /usr/sbin/visudo -cf %s
