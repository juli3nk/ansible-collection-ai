---
- name: Validate OpenClaw role configuration
  ansible.builtin.assert:
    that:
      - openclaw_user | length > 0
      - openclaw_npm_package | length > 0
      - openclaw_npm_version | length > 0
    fail_msg: >-
      openclaw_user, openclaw_npm_package and openclaw_npm_version must be set
      to install OpenClaw from npm.

- import_tasks: user.yml
- import_tasks: uninstall.yml
- import_tasks: install.yml
